<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouCanWrite</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100" style="display: flex; flex-direction: column; min-height: 100vh;">
    <div class="flex flex-col flex-grow">
        <nav class="bg-white shadow-lg py-6 px-4">
            <div class="container mx-auto flex justify-between items-center">
                <a href="index.html" class="text-2xl font-bold">YouCanWrite</a>
                <div>
                    <a href="login.html" class="text-gray-700 hover:text-blue-500 mr-6">Login</a>
                    <a href="register.html" class="text-gray-700 hover:text-blue-500">Register</a>
                </div>
            </div>
        </nav>
        <main class="container mx-auto py-8 px-4 text-center flex-grow" style="flex: 1;">
            <h1 class="text-5xl font-bold my-10">HAVE A WRITING BLOCK?</h1>
            <p id="changing-text" class="text-xl text-gray-700 mb-10">Join our writing community and get your daily dose of writing inspiration and feedback.</p>
            <div class="flex justify-center">
                <a href="login.html" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-700 inline-block">Start Writing</a>
            </div>
            <div class="mt-12">
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                    <img src="images/1.jpg" alt="Gallery Image 1" class="w-full h-auto rounded-lg shadow">
                    <img src="images/1.jpg" alt="Gallery Image 2" class="w-full h-auto rounded-lg shadow">
                    <img src="images/1.jpg" alt="Gallery Image 3" class="w-full h-auto rounded-lg shadow">
                </div>
            </div>

    </div>
    <footer class="bg-gray-800 text-white text-center py-4">
        &copy; 2024 YouCanWrite. All rights reserved.
    </footer>
    <script src="js/textchange.js"></script>
