<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - YouCanWrite</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100" style="display: flex; flex-direction: column; min-height: 100vh;">
    <div class="flex flex-col flex-grow">
        <nav class="bg-white shadow-lg py-6 px-4">
            <div class="container mx-auto flex justify-between items-center">
                <a href="index.html" class="text-2xl font-bold">YouCanWrite</a>
                <div>
                    <a href="login.html" class="text-gray-700 hover:text-blue-500 mr-6">Login</a>
                    <a href="register.html" class="text-gray-700 hover:text-blue-500">Register</a>
                </div>
            </div>
        </nav>
    <main class="container mx-auto p-4 flex-grow">
        <h2 class="text-3xl font-bold text-center mb-6">Register</h2>
        <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
            <form>
                <div class="mb-4">
                    <label class="block text-gray-700">Username</label>
                    <input type="text" class="w-full p-2 border border-gray-300 rounded-lg" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700">Email</label>
                    <input type="email" class="w-full p-2 border border-gray-300 rounded-lg" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700">Password</label>
                    <input type="password" class="w-full p-2 border border-gray-300 rounded-lg" required>
                </div>
                <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-700">Register</button>
            </form>
        </div>
    </main>
    <footer class="bg-gray-800 text-white text-center py-4">
        &copy; 2024 YouCanWrite. All rights reserved.
    </footer>
</body>
</html>
